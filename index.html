
<!-- Countdown: Countdown to Summer Break -->
<div id="cd-wrap" style="background:#000000;padding:1.5rem 2rem;border-radius:10px;display:inline-block;font-family:'Trebuchet MS',sans-serif;text-align:center">
  <div style="color:#ffffff;font-size:16px;font-weight:500;margin-bottom:1rem">Countdown to Summer Break</div>
  <div id="cd-nums" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"></div>
</div>
<script>
(function(){
  var t=new Date('2026-05-21T03:45'),excl=true,done="We're live!";
  function pad(n){return String(n).padStart(2,"0")}
  function biz(a,b){var c=0,d=new Date(a);d.setHours(0,0,0,0);var e=new Date(b);e.setHours(0,0,0,0);while(d<e){var w=d.getDay();if(w&&w!==6)c++;d.setDate(d.getDate()+1)}return c}
  function tick(){
    var now=new Date(),diff=t-now,g=document.getElementById("cd-nums");
    if(!g)return;
    if(diff<=0){g.innerHTML='<span style="color:#f3d512;font-size:20px;font-weight:500">'+done+'</span>';return}
    var u=excl?[{v:biz(now,t),l:"days"},{v:Math.floor(diff%86400000/3600000),l:"hours"},{v:Math.floor(diff%3600000/60000),l:"min"},{v:Math.floor(diff%60000/1000),l:"sec"}]:[{v:Math.floor(diff/86400000),l:"days"},{v:Math.floor(diff%86400000/3600000),l:"hours"},{v:Math.floor(diff%3600000/60000),l:"min"},{v:Math.floor(diff%60000/1000),l:"sec"}];
    g.innerHTML=u.map(function(x){return '<div style="text-align:center"><div style="width:64px;height:64px;border-radius:8px;background:#8846b4;color:#f3d512;font-size:50px;font-weight:500;display:flex;align-items:center;justify-content:center">'+pad(x.v)+'</div><div style="font-size:10px;color:#ffffff;text-transform:uppercase;letter-spacing:.06em;margin-top:5px">'+x.l+'</div></div>'}).join("");
    setTimeout(tick,1000);
  }
  tick();
})();
</script>
